version: '3.8'

services:
  backend:
    build:
      context: ./python_backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./python_backend/uploads:/app/uploads
      - ./python_backend/outputs:/app/outputs
    environment:
      - FLASK_ENV=production
      - PORT=5000
    restart: unless-stopped
    networks:
      - ai_network

  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - ai_network

networks:
  ai_network:
    driver: bridge
