version: '3.8'

services:
  backend:
    build:
      context: ./python_backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_outputs:/app/outputs
      - backend_models:/app/models
      - ./python_backend:/app
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  websocket:
    build:
      context: ./python_backend
      dockerfile: Dockerfile.ws
    ports:
      - "5001:5001"
    volumes:
      - backend_uploads:/app/uploads
      - backend_outputs:/app/outputs
      - backend_models:/app/models
    environment:
      - WS_PORT=5001
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - ai_network
    depends_on:
      backend:
        condition: service_healthy

