name: ai_image_editor
description: AI-powered image editor and video maker with real-time AI processing
version: 2.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  image_picker: ^1.0.5
  image_gallery_saver: ^2.0.3
  photo_view: ^0.15.0
  crop_your_image: ^1.0.1

  dio: ^5.3.3
  web_socket_channel: ^2.4.0

  provider: ^6.0.5
  shared_preferences: ^2.2.0

  path_provider: ^2.1.1
  file_picker: ^6.1.1

  video_player: ^2.8.1
  video_thumbnail: ^0.5.0

  google_ml_kit: ^0.16.0

  lottie: ^2.7.0
  animations: ^2.0.7

  permission_handler: ^11.0.1
  share_plus: ^7.2.1
  cached_network_image: ^3.3.0
  flutter_colorpicker: ^1.0.3
  flutter_slidable: ^3.0.1
  flutter_blurhash: ^0.8.2
  percent_indicator: ^4.2.3
  flutter_native_splash: ^2.3.0
  flutter_launcher_icons: ^0.13.1
  flutter_local_notifications: ^17.2.1
  connectivity_plus: ^5.0.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/animations/
    - assets/videos/
    - assets/models/

flutter_native_splash:
  color: "#0D0D1A"
  image: assets/icons/app_icon.png
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#0D0D1A"
  adaptive_icon_foreground: assets/icons/app_icon.png
