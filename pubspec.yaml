name: ai_image_editor
description: AI-powered image editor and video maker
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  glass: ^1.2.0

  image_picker: ^1.0.5
  image_gallery_saver: ^2.0.3
  photo_view: ^0.15.0
  crop_your_image: ^1.0.1
  colorfilter_generator: ^0.0.7

  flutter_signature_pad: ^3.0.0

  dio: ^5.3.3
  web_socket_channel: ^2.4.0

  provider: ^6.0.5
  flutter_riverpod: ^2.4.0

  path_provider: ^2.1.1
  file_picker: ^6.1.1

  video_player: ^2.8.1
  video_thumbnail: ^0.5.0

  google_ml_kit: ^0.16.0

  lottie: ^2.7.0
  animations: ^2.0.7

  permission_handler: ^11.0.1
  share_plus: ^7.2.1
  cached_network_image: ^3.3.0
  flutter_colorpicker: ^1.0.3
  flutter_slidable: ^3.0.1
  timeline_tile: ^2.0.0
  flutter_blurhash: ^0.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/animations/
    - assets/videos/
    - assets/models/
